<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Program Images | Campus Recreation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f8f8f8;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    h1 {
      text-align: center;
      margin-bottom: 48px;
    }

    h2 {
      margin-top: 56px;
      padding-bottom: 6px;
      border-bottom: 2px solid #ccc;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .gallery a {
      display: block;
      border-radius: 6px;
      overflow: hidden;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
      background-color: #ddd;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .gallery a:hover img,
    .gallery a:focus img {
      transform: scale(1.06);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.25);
    }

    footer {
      margin-top: 80px;
      text-align: center;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
