
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bucket Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      padding: 40px;
      background: #f6f6f6;
    }

    h2 {
      color: #011F5B;
      border-bottom: 3px solid #ddd;
      padding-bottom: 8px;
    }

    .carousel {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }

    .carousel-track {
      display: flex;
      gap: 16px;
      overflow: hidden;
      width: 100%;
    }

    .carousel-track img {
      width: 220px;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      background: #ccc;
    }

    .nav {
      font-size: 2rem;
      background: none;
      border: none;
      cursor: pointer;
      color: #011F5B;
    }
  </style>
</head>

<body>

<h2>TEST CAROUSEL</h2>

<div class="carousel" data-gallery="test">
  <button class="nav prev">‹</button>
  <div class="carousel-track"></div>
  <button class="nav next">›</button>
</div>

<script>
  const galleries = {
    test: [
      "https://live.staticflickr.com/65535/55195784974_cac063796c_w.jpg",
      "https://live.staticflickr.com/65535/55195683198_abc0707c04_w.jpg",
      "https://live.staticflickr.com/65535/55195683343_18a1e6a8ce_w.jpg"
    ]
  };

  document.querySelectorAll(".carousel").forEach(carousel => {
    const key = carousel.dataset.gallery;
    const images = galleries[key];
    const track = carousel.querySelector(".carousel-track");

    let index = 0;
    const visible = 3;

    function render() {
      track.innerHTML = "";
      images.slice(index, index + visible).forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        track.appendChild(img);
      });
    }

    carousel.querySelector(".prev").onclick = () => {
      index = Math.max(0, index - 1);
      render();
    };

    carousel.querySelector(".next").onclick = () => {
      index = Math.min(images.length - visible, index + 1);
      render();
    };

    render();
  });
</script>

</body>
</html>
