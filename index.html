
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Program Images</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 32px;
      background: #f6f6f6;
      color: #222;
    }

    h1 {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-title {
      color: #011F5B;
      font-weight: 700;
      margin-top: 72px;
      margin-bottom: 24px;
      border-bottom: 3px solid #ddd;
      padding-bottom: 8px;
    }

    /* ==== GRID ==== */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .grid-item {
      overflow: hidden;
      border-radius: 10px;
      background: #ccc;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .grid-item.show {
      opacity: 1;
      transform: translateY(0);
    }

    .grid-item img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .grid-item:hover img {
      transform: scale(1.06);
      box-shadow: 0 16px 32px rgba(0,0,0,0.25);
    }

    footer {
      margin-top: 96px;
      text-align: center;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>

<body>

<h1>Program Images</h1>

<h2 class="section-title">Pride Day (April 7)</h2>
<div class="image-grid" data-gallery="pride-day"></div>

<h2 class="section-title">Intramurals</h2>
<div class="image-grid" data-gallery="intramurals"></div>

<footer>
  Images are hosted on Flickr’s public CDN.
</footer>

<script>
  /*
    ✅ ONLY THIS SECTION CHANGES MONTHLY
    ✅ Paste ONE image URL per line
  */
  const galleries = {
    "pride-day": [
      "https://live.staticflickr.com/65535/55195784974_cac063796c_w.jpg",
      "https://live.staticflickr.com/65535/55195683198_abc0707c04_w.jpg"
      // add more
    ],
    "intramurals": [
      "https://live.staticflickr.com/65535/55170328098_c202f9b500_w.jpg"
    ]
  };

  // render grids
  document.querySelectorAll(".image-grid").forEach(grid => {
    const key = grid.dataset.gallery;
    const images = galleries[key] || [];

    images.forEach(src => {
      const photoId = src.split("/").pop().split("_")[0];
      const link = `https://www.flickr.com/photo.gne?id=${photoId}`;

      const anchor = document.createElement("a");
      anchor.href = link;
      anchor.target = "_blank";
      anchor.rel = "noopener";

      const item = document.createElement("div");
      item.className = "grid-item";

      const img = document.createElement("img");
      img.src = src;
      img.loading = "lazy";

      item.appendChild(img);
      anchor.appendChild(item);
      grid.appendChild(anchor);
    });
  });

  // scroll reveal
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("show");
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll(".grid-item").forEach(item => {
    observer.observe(item);
  });
</script>

</body>
</html>
