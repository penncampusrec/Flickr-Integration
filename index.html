<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Program Images</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ======================== -->
  <!--        STYLES           -->
  <!-- ======================== -->
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 32px;
      background: #f6f6f6;
      color: #222;
    }

    h1 {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-title {
      color: #011F5B; /* Penn Navy */
      font-weight: 700;
      margin-top: 64px;
      margin-bottom: 16px;
      border-bottom: 3px solid #ddd;
      padding-bottom: 8px;
    }

    .carousel {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }

    .carousel-track {
      display: flex;
      gap: 16px;
      overflow: hidden;
      width: 100%;
    }

    .carousel-track a {
      display: block;
    }

    .carousel-track img {
      width: 220px;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
      background: #ccc;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .carousel-track a:hover img {
      transform: scale(1.06);
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
    }

    .nav {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      color: #011F5B;
      padding: 0 12px;
      user-select: none;
    }

    footer {
      margin-top: 96px;
      text-align: center;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>

<body>

<h1>Program Images</h1>

<!-- ======================== -->
<!--        SECTIONS          -->
<!-- ======================== -->

<h2 class="section-title">Pride Day (April 7)</h2>
<div class="carousel" data-gallery="pride-day">
  <button class="nav prev">‹</button>
  <div class="carousel-track"></div>
  <button class="nav next">›</button>
</div>

<h2 class="section-title">Night at the Rec (2025)</h2>
<div class="carousel" data-gallery="night-rec">
  <button class="nav prev">‹</button>
  <div class="carousel-track"></div>
  <button class="nav next">›</button>
</div>

<h2 class="section-title">Fitness &amp; Wellbeing</h2>
<div class="carousel" data-gallery="fitness">
  <button class="nav prev">‹</button>
  <div class="carousel-track"></div>
  <button class="nav next">›</button>
</div>

<h2 class="section-title">Intramurals</h2>
<div class="carousel" data-gallery="intramurals">
  <button class="nav prev">‹</button>
  <div class="carousel-track"></div>
  <button class="nav next">›</button>
</div>

<h2 class="section-title">Outdoor Adventure &amp; Climbing</h2>
<div class="carousel" data-gallery="outdoor">
  <button class="nav prev">‹</button>
  <div class="carousel-track"></div>
  <button class="nav next">›</button>
</div>

<footer>
  Images are hosted on Flickr’s public CDN. Hover to preview; click to view on Flickr.
</footer>

<!-- ======================== -->
<!--      JAVASCRIPT          -->
<!-- ======================== -->

    ],
    "night-rec": [
      // NIGHT AT THE REC LINKS GO HERE
    ],
    "fitness": [
      // FITNESS & WELLBEING LINKS GO HERE
    ],
    "intramurals": [
      // INTRAMURALS LINKS GO HERE
    ],
    "outdoor": [
      // OUTDOOR ADVENTURE & CLIMBING LINKS GO HERE
    ]
  };

  document.querySelectorAll(".carousel").forEach(carousel => {
    const key = carousel.dataset.gallery;
    const images = galleries[key] || [];
    const track = carousel.querySelector(".carousel-track");

    let index = 0;
    const visible = 5;

    function render() {
      track.innerHTML = "";
      images.slice(index, index + visible).forEach(src => {
        const photoId = src.split("/").pop().split("_")[0];
        const flickrUrl = `https://www.flickr.com/photo.gne?id=${photoId}`;

        const link = document.createElement("a");
        link.href = flickrUrl;
        link.target = "_blank";
        link.rel = "noopener";

        const img = document.createElement("img");
        img.src = src;
        img.loading = "lazy";

        link.appendChild(img);
        track.appendChild(link);
      });
    }

    carousel.querySelector(".prev").onclick = () => {
      index = Math.max(0, index - 1);
      render();
    };

    carousel.querySelector(".next").onclick = () => {
      index = Math.min(images.length - visible, index + 1);
      render();
    };

    render();
  });
</script>

</body>
</html>
