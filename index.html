<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Program Images | Campus Recreation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f6f6f6;
      margin: 0;
      padding: 32px;
      color: #222;
    }

    h1 {
      text-align: center;
      margin-bottom: 56px;
    }

    h2 {
      margin-top: 64px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 3px solid #ddd;
    }

    /* Estrada-style grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    /* Image card */
    .card {
      position: relative;
      width: 100%;
      height: 170px;              /* FIXED card height */
      overflow: hidden;
      border-radius: 10px;
      background: #ccc;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;          /* KEY Estrada behavior */
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover img {
      transform: scale(1.08);
      box-shadow: 0 16px 32px rgba(0,0,0,0.25);
    }

    footer {
      margin-top: 96px;
      text-align: center;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>

<body>

<h1>Program Images</h1>
